  - type: Features
    data:
      - name: Hudson Yards
        description: >-
          25-acre mixed-use development on Manhattan's West Side with residential
          towers (15 and 35 Hudson Yards), 70 Hudson Yards office tower, The Shops
          at Hudson Yards, Vessel, and the Edge observation deck; Manhattan's first
          LEED Gold Neighborhood Development.
      - name: The Grand LA
        description: >-
          Frank Gehry-designed mixed-use project on Bunker Hill in downtown Los
          Angeles with residences, Conrad Los Angeles hotel, restaurants, and retail
          opposite Walt Disney Concert Hall.
      - name: Time Warner Center (Deutsche Bank Center)
        description: >-
          Twin-tower mixed-use development at Columbus Circle, NYC, with residences,
          office, retail, Mandarin Oriental hotel, and Jazz at Lincoln Center.
      - name: The 78
        description: >-
          62-acre mixed-use neighborhood under development by Related Midwest along
          the Chicago River in the South Loop.
      - name: Affordable & Workforce Housing
        description: >-
          Owns and manages approximately 55,000 affordable and workforce housing units
          across the United States and pledges to never convert affordable units to
          market rate.
      - name: Luxury Residential
        description: >-
          Luxury condominium and rental towers in NYC, Boston, Chicago, Los Angeles,
          San Francisco, Miami, and London under Related Rentals and the regional brands.
      - name: Retail & City Centers
        description: >-
          Develops and operates retail, office, and city-center mixed-use projects
          including The Shops at Hudson Yards and Deutsche Bank Center.
      - name: Hospitality
        description: >-
          Develops and operates hotels in flagship mixed-use projects (Equinox Hotel
          Hudson Yards, Conrad Los Angeles at The Grand LA, Mandarin Oriental at
          Deutsche Bank Center).
      - name: Data Centers (Related Digital)
        description: >-
          Related Digital division developing and operating data-center real estate
          for hyperscale and enterprise tenants.
  - type: UseCases
    data:
      - name: Property Portfolio Information
        description: >-
          Marketing-only access to information about Related's developments, leasing
          opportunities, and residential offerings via individual property websites.
      - name: Residential Leasing & Sales
        description: >-
          Renter and buyer inquiries handled through relatedrentals.com and individual
          condominium sales sites with no public developer-facing APIs.
      - name: Affordable Housing Applications
        description: >-
          Affordable-housing applications handled via individual property websites and
          jurisdictional lotteries (e.g., NYC Housing Connect) rather than a Related API.
      - name: Procurement & Vendor Relationships
        description: >-
          Vendor, broker, and partner relationships handled through direct contact and
          regional development teams.
  - type: Integrations
    data:
      - name: Equinox Holdings
        description: >-
          Stephen Ross holds a majority stake in Equinox Holdings (Equinox fitness clubs,
          Equinox Hotels, SoulCycle, Blink Fitness); Equinox Hotel Hudson Yards is the
          flagship hospitality anchor at Hudson Yards.
      - name: Miami Dolphins & Hard Rock Stadium
        description: >-
          Stephen Ross owns the Miami Dolphins NFL franchise and Hard Rock Stadium,
          which hosts the Miami Open and Formula 1 Miami Grand Prix.
      - name: Related Argent (UK)
        description: >-
          UK joint venture developing major mixed-use schemes in London including King's
          Cross and Brent Cross Town.
      - name: NYC Housing Connect
        description: >-
          Related-built affordable units in New York City are leased through the city's
          public Housing Connect lottery system.
