description: >-
  Related Companies is a privately held, fully integrated real estate firm founded by
  Stephen Ross in 1972 as an affordable-housing developer and now active across
  luxury residential, affordable housing, retail, office, hospitality, data centers,
  and city-scale mixed-use development. Related is the developer of Hudson Yards
  in New York City, The Grand LA, Time Warner Center (now Deutsche Bank Center),
  The 78 in Chicago, and operates regional platforms including Related Beal,
  Related Midwest, Related California, Related Ross, and Related Argent in the UK.
  The firm owns and manages roughly 55,000 affordable and workforce housing units
  and has stated it has never converted a single affordable unit to market rate.
  Stephen Ross also owns a majority stake in Equinox Holdings (Equinox fitness clubs,
  Equinox Hotels, SoulCycle, Blink Fitness) and the Miami Dolphins / Hard Rock Stadium.
